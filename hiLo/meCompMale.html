<div class="controls">
    <button id="button0">
      Play / Pause all
    </button>

    <script>
    var btn0 = document.getElementById("button0")
    btn0.addEventListener("click", playPause)
    function playPause() {
      var videos = document.querySelectorAll("video");
      var len = videos.length;
      for(var i=0; i<len; i++){
        var myVideo = videos[i];
        if (myVideo.paused)
          myVideo.play();
        else
          myVideo.pause();
      }
    }
    </script>

    <button id="button1">
        Reset all
    </button>

    <script>
    var btn1 = document.getElementById("button1")
    btn1.addEventListener("click", resetAll)
    function resetAll() {
        var videos = document.querySelectorAll("video");
        var len=videos.length;
        for(var i=0; i<len; i++){
          var myVideo = videos[i];
          myVideo.pause();
          myVideo.currentTime = 0;
      }
    }
    </script>
</div>
